<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
/* =========================================================
   DESIGN SYSTEM  — premium / minimalista (Notion · Linear · Apple)
   ========================================================= */
:root{
  --accent:#8E2C4E;            /* bordô elegante */
  --accent-2:#C8A951;          /* dourado */
  --accent-soft:#f7e9ee;
  --bg:#faf9f7;
  --surface:#ffffff;
  --surface-2:#f4f3f0;
  --text:#1c1b1a;
  --text-2:#6b6863;
  --text-3:#9a968f;
  --line:#eceae6;
  --line-2:#e2dfd9;
  --ok:#2f8f5b; --ok-soft:#e7f3ec;
  --warn:#c9831f; --warn-soft:#fbf0dd;
  --bad:#c0413f; --bad-soft:#fbe9e8;
  --info:#3a6ea5; --info-soft:#e8f0f8;
  --radius:16px; --radius-sm:11px; --radius-xs:8px;
  --shadow:0 1px 2px rgba(20,18,16,.04),0 8px 24px -12px rgba(20,18,16,.12);
  --shadow-lg:0 12px 40px -12px rgba(20,18,16,.22);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif;
}
html[data-theme="dark"]{
  --accent:#e088a6; --accent-2:#d9bd6e; --accent-soft:#34232a;
  --bg:#161413; --surface:#1f1c1b; --surface-2:#262220;
  --text:#f3f0ec; --text-2:#b3ada5; --text-3:#807a72;
  --line:#2c2826; --line-2:#383330;
  --ok:#5cc285; --ok-soft:#1e2c24; --warn:#e2ab5c; --warn-soft:#2e271a;
  --bad:#e87b78; --bad-soft:#2e1e1d; --info:#7aa7d6; --info-soft:#1c2530;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px -12px rgba(0,0,0,.6);
  --shadow-lg:0 14px 44px -12px rgba(0,0,0,.7);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;line-height:1.5;
  font-size:15px;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--text)}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:20px;border:3px solid var(--bg)}

/* ---------- Layout ---------- */
.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.sidebar{position:sticky;top:0;height:100vh;background:var(--surface);border-right:1px solid var(--line);
  display:flex;flex-direction:column;padding:20px 14px;gap:4px;overflow-y:auto}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 16px}
.brand .cap{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--accent-2));
  display:grid;place-items:center;color:#fff;font-size:19px;flex-shrink:0;box-shadow:var(--shadow)}
.brand b{font-size:15px;font-weight:650;letter-spacing:-.2px;display:block;line-height:1.15}
.brand small{font-size:12px;color:var(--text-3)}
.nav-label{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.6px;padding:14px 10px 6px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:var(--radius-sm);
  color:var(--text-2);font-size:14.5px;font-weight:500;width:100%;text-align:left;transition:.15s;position:relative}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
.nav-item .ico{width:19px;height:19px;flex-shrink:0;display:grid;place-items:center}
.nav-item .badge{margin-left:auto;font-size:11px;background:var(--surface-2);color:var(--text-2);
  padding:1px 7px;border-radius:20px;font-weight:600}
.nav-item.active .badge{background:var(--accent);color:#fff}
.sidebar-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:center}

.main{min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 86%,transparent);
  backdrop-filter:saturate(180%) blur(14px);-webkit-backdrop-filter:saturate(180%) blur(14px);
  border-bottom:1px solid var(--line);padding:14px 28px;display:flex;align-items:center;gap:14px}
.topbar h1{font-size:20px;font-weight:680;letter-spacing:-.4px}
.topbar .sub{font-size:13px;color:var(--text-3);margin-top:1px}
.topbar .spacer{flex:1}
.menu-btn{display:none}
.content{padding:24px 28px 80px;max-width:1240px;width:100%;margin:0 auto;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:var(--radius-sm);
  font-size:14px;font-weight:600;background:var(--surface);border:1px solid var(--line-2);color:var(--text);
  transition:.15s;white-space:nowrap}
.btn:hover{background:var(--surface-2);border-color:var(--text-3)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{filter:brightness(1.07)}
.btn.ghost{border-color:transparent;background:transparent}
.btn.ghost:hover{background:var(--surface-2)}
.btn.sm{padding:6px 11px;font-size:13px}
.btn.danger{color:var(--bad);border-color:var(--bad-soft)}
.btn.danger:hover{background:var(--bad-soft)}
.icon-btn{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;border:1px solid var(--line-2);background:var(--surface)}
.icon-btn:hover{background:var(--surface-2)}

/* ---------- Cards ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.grid{display:grid;gap:16px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 18px 16px;
  box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi .lab{font-size:12.5px;color:var(--text-2);font-weight:550;display:flex;align-items:center;gap:7px}
.kpi .val{font-size:27px;font-weight:720;letter-spacing:-.8px;margin-top:8px;line-height:1}
.kpi .hint{font-size:12px;color:var(--text-3);margin-top:6px}
.kpi .dot{width:9px;height:9px;border-radius:50%}
.section-title{font-size:13px;font-weight:650;color:var(--text-2);text-transform:uppercase;letter-spacing:.5px;
  margin:30px 2px 14px;display:flex;align-items:center;gap:9px}
.section-title:first-child{margin-top:6px}

/* ---------- Badges / chips ---------- */
.chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px;
  background:var(--surface-2);color:var(--text-2);white-space:nowrap}
.chip.alta{background:var(--bad-soft);color:var(--bad)}
.chip.media{background:var(--warn-soft);color:var(--warn)}
.chip.baixa{background:var(--info-soft);color:var(--info)}
.chip.comprado{background:var(--ok-soft);color:var(--ok)}
.chip.pendente{background:var(--surface-2);color:var(--text-2)}
.chip.confirmado{background:var(--ok-soft);color:var(--ok)}
.chip.recusado{background:var(--bad-soft);color:var(--bad)}
.chip.aguardando{background:var(--warn-soft);color:var(--warn)}
.chip.vip{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff}
.chip.sug{background:var(--accent-soft);color:var(--accent)}
.tag-cat{font-size:11.5px;color:var(--text-3);font-weight:600}

/* ---------- Progress ---------- */
.bar{height:8px;border-radius:20px;background:var(--surface-2);overflow:hidden}
.bar>span{display:block;height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width .6s cubic-bezier(.2,.8,.2,1)}

/* ---------- Tables ---------- */
.tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface)}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3);
  font-weight:650;padding:12px 14px;border-bottom:1px solid var(--line);white-space:nowrap;background:var(--surface)}
td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{transition:.12s}
tbody tr:hover{background:var(--surface-2)}
th.sortable{cursor:pointer;user-select:none}
th.sortable:hover{color:var(--text)}

/* ---------- Forms ---------- */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:13px;font-weight:600;color:var(--text-2)}
.input,select.input,textarea.input{width:100%;padding:10px 12px;border:1px solid var(--line-2);border-radius:var(--radius-xs);
  background:var(--surface);transition:.15s}
.input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
textarea.input{resize:vertical;min-height:64px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
.search{flex:1;min-width:180px;position:relative}
.search input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--line-2);border-radius:var(--radius-sm);background:var(--surface)}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-3)}
.seg{display:inline-flex;background:var(--surface-2);border-radius:10px;padding:3px;gap:2px}
.seg button{padding:6px 13px;border-radius:8px;font-size:13px;font-weight:600;color:var(--text-2)}
.seg button.on{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(20,18,16,.4);backdrop-filter:blur(3px);z-index:100;
  display:flex;align-items:flex-end;justify-content:center;padding:0;animation:fade .2s}
@media(min-width:700px){.overlay{align-items:center;padding:24px}}
.modal{background:var(--surface);width:100%;max-width:620px;max-height:92vh;overflow-y:auto;
  border-radius:20px 20px 0 0;box-shadow:var(--shadow-lg);animation:slideup .28s cubic-bezier(.2,.9,.2,1)}
@media(min-width:700px){.modal{border-radius:20px}}
@keyframes slideup{from{transform:translateY(30px);opacity:.6}to{transform:none;opacity:1}}
.modal-head{display:flex;align-items:center;gap:10px;padding:18px 20px;border-bottom:1px solid var(--line);
  position:sticky;top:0;background:var(--surface);z-index:2}
.modal-head h3{font-size:17px;font-weight:680;letter-spacing:-.3px}
.modal-body{padding:20px}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:16px 20px;border-top:1px solid var(--line);
  position:sticky;bottom:0;background:var(--surface)}

/* ---------- Timeline ---------- */
.tl{position:relative;padding-left:30px}
.tl::before{content:"";position:absolute;left:9px;top:6px;bottom:6px;width:2px;background:var(--line-2)}
.tl-item{position:relative;padding:0 0 22px}
.tl-dot{position:absolute;left:-29px;top:2px;width:20px;height:20px;border-radius:50%;background:var(--surface);
  border:2px solid var(--accent);display:grid;place-items:center;font-size:10px}
.tl-item.done .tl-dot{background:var(--ok);border-color:var(--ok);color:#fff}
.tl-item.warn .tl-dot{background:var(--warn);border-color:var(--warn);color:#fff}
.tl-item.grad .tl-dot{background:linear-gradient(135deg,var(--accent),var(--accent-2));border-color:transparent;color:#fff}
.tl-date{font-size:12px;font-weight:650;color:var(--text-3)}
.tl-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 14px;margin-top:5px;box-shadow:var(--shadow)}

/* ---------- Misc ---------- */
.muted{color:var(--text-3)}
.empty{text-align:center;padding:50px 20px;color:var(--text-3)}
.empty .big{font-size:40px;margin-bottom:10px}
.row{display:flex;align-items:center;gap:10px}
.wrap{flex-wrap:wrap}
.between{justify-content:space-between}
.donut-wrap{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.legend{display:flex;flex-direction:column;gap:9px}
.legend div{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--text-2)}
.legend .sw{width:12px;height:12px;border-radius:4px}
.opt-list{margin-top:10px;border-top:1px dashed var(--line-2);padding-top:10px;display:flex;flex-direction:column;gap:8px}
.opt{font-size:13px;color:var(--text-2);display:flex;gap:8px;align-items:baseline}
.opt.fav{color:var(--text);font-weight:600}
.opt .pr{font-variant-numeric:tabular-nums;font-weight:600;color:var(--accent);flex-shrink:0}
.card-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:14px}
.gcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);position:relative}
.gcard.norsvp{border-left:3px solid var(--warn)}
.gcard.vip{border-left:3px solid var(--accent-2)}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);
  padding:11px 18px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:var(--shadow-lg);opacity:0;
  transition:.3s;z-index:300;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.switch{position:relative;display:inline-block;width:42px;height:24px;flex-shrink:0}
.switch input{display:none}
.switch span{position:absolute;inset:0;background:var(--line-2);border-radius:20px;transition:.2s}
.switch span::before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.switch input:checked+span{background:var(--accent)}
.switch input:checked+span::before{transform:translateX(18px)}
.pill-row{display:flex;gap:8px;flex-wrap:wrap}
.minibar{display:flex;align-items:center;gap:8px}
.minibar .bar{flex:1;min-width:60px}
.note{background:var(--surface-2);border-radius:var(--radius-sm);padding:12px 14px;font-size:13.5px;color:var(--text-2);border:1px solid var(--line)}
.alert{display:flex;gap:11px;padding:13px 15px;border-radius:var(--radius-sm);font-size:14px;align-items:flex-start}
.alert.warn{background:var(--warn-soft);color:var(--warn)}
.alert.bad{background:var(--bad-soft);color:var(--bad)}
.alert.ok{background:var(--ok-soft);color:var(--ok)}
.alert.info{background:var(--info-soft);color:var(--info)}
.color-dot{width:26px;height:26px;border-radius:8px;border:2px solid var(--line-2);cursor:pointer}
.color-dot.on{border-color:var(--text);box-shadow:0 0 0 2px var(--surface),0 0 0 4px var(--text)}

/* ---------- Mobile ---------- */
@media(max-width:920px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:270px;z-index:200;transform:translateX(-100%);
    transition:transform .28s cubic-bezier(.2,.9,.2,1);box-shadow:var(--shadow-lg)}
  .sidebar.open{transform:none}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:150;opacity:0;pointer-events:none;transition:.25s}
  .scrim.show{opacity:1;pointer-events:auto}
  .menu-btn{display:grid}
  .topbar{padding:12px 16px}
  .topbar h1{font-size:17px}
  .content{padding:18px 16px 90px}
  .form-row{grid-template-columns:1fr}
  .kpi .val{font-size:23px}
}
@media(max-width:520px){
  .kpis{grid-template-columns:1fr 1fr}
  .hide-sm{display:none!important}
}

/* ---------- Login ---------- */
.login{position:fixed;inset:0;z-index:500;display:grid;place-items:center;padding:24px;
  background:radial-gradient(130% 120% at 50% -10%,var(--accent-soft),var(--bg) 62%)}
.login-card{background:var(--surface);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow-lg);
  padding:36px 30px 30px;max-width:404px;width:100%;text-align:center;animation:slideup .4s cubic-bezier(.2,.9,.2,1)}
.login-card .cap{width:64px;height:64px;border-radius:19px;background:linear-gradient(135deg,var(--accent),var(--accent-2));
  display:grid;place-items:center;font-size:31px;margin:0 auto 18px;box-shadow:var(--shadow)}
.login-card h1{font-size:22px;font-weight:760;letter-spacing:-.5px;margin-bottom:9px}
.login-card p{font-size:13.5px;line-height:1.55}
.login-card input{margin-top:18px;text-align:center;font-size:16px;padding:13px}
.login-users{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.login-users .chip{cursor:pointer;padding:7px 13px;font-size:13px;border:1px solid var(--line-2)}
.login-users .chip:hover{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
.userbox{display:flex;align-items:center;gap:9px;width:100%}
.uava{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));
  color:#fff;display:grid;place-items:center;font-weight:700;flex-shrink:0;box-shadow:var(--shadow)}

/* ---------- Print / PDF report ---------- */
#report{display:none}
@media print{
  @page{margin:14mm}
  .sidebar,.topbar,.scrim,.menu-btn,.no-print,.overlay{display:none!important}
  .app{display:block}
  .content{display:none!important}
  body{background:#fff;font-size:12px}
  #report{display:block!important;color:#000}
  #report .r-head{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid var(--accent);padding-bottom:12px;margin-bottom:18px}
  #report h2{font-size:22px;color:var(--accent)}
  #report h3{font-size:15px;margin:18px 0 8px;border-bottom:1px solid #ddd;padding-bottom:5px;color:#333}
  #report table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:10px}
  #report th,#report td{border:1px solid #ccc;padding:5px 7px;text-align:left}
  #report th{background:#f3eef0}
  #report .rk{display:inline-block;border:1px solid #ddd;border-radius:8px;padding:8px 12px;margin:0 8px 8px 0}
  #report .rk b{display:block;font-size:17px;color:var(--accent)}
  #report .rk span{font-size:10px;color:#666}
  #report svg{max-width:230px}
  .print-only{display:block}
}
.print-only{display:none}
</style>
</head>

function money0(v){v=Number(v||0);return cur()+" "+v.toLocaleString("pt-BR",{maximumFractionDigits:0});}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function uid(p){return p+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

const MES=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
const MESF=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
function fmtDate(s){if(!s)return"";const d=new Date(s+"T00:00:00");if(isNaN(d))return s;return d.toLocaleDateString("pt-BR");}
function today(){return new Date();}
function daysUntil(s){if(!s)return null;const d=new Date(s+"T00:00:00");if(isNaN(d))return null;return Math.ceil((d-today())/864e5);}
function monthLabel(offset){const d=new Date();d.setDate(1);d.setMonth(d.getMonth()+offset);return MES[d.getMonth()]+"/"+String(d.getFullYear()).slice(2);}
function monthLabelFull(offset){const d=new Date();d.setDate(1);d.setMonth(d.getMonth()+offset);return MESF[d.getMonth()]+" de "+d.getFullYear();}

/* ---------- Derived metrics ---------- */
function itemVal(i){return i.status==="comprado"&&i.valorReal!=null?Number(i.valorReal):Number(i.valorEstimado||0);}
function metrics(){
  const it=S.items;
  const comprados=it.filter(i=>i.status==="comprado");
  const pendentes=it.filter(i=>i.status!=="comprado");
  const totalPrevisto=it.reduce((s,i)=>s+itemVal(i),0);
  const gasto=comprados.reduce((s,i)=>s+itemVal(i),0);
  const pendenteVal=pendentes.reduce((s,i)=>s+Number(i.valorEstimado||0),0);
  const meta=Number(S.config.metaFinanceira||totalPrevisto);
  const pct=it.length?Math.round(comprados.length/it.length*100):0;
  const pctVal=totalPrevisto?Math.round(gasto/totalPrevisto*100):0;
  return {comprados,pendentes,totalPrevisto,gasto,pendenteVal,meta,pct,pctVal,restante:Math.max(0,meta-gasto)};
}

/* ---------- Finance simulation (purchase schedule) ---------- */
function purchaseQueue(){
  // pending items with a price > 0, ordered by deadline urgency -> priority -> cheaper first
  return S.items.filter(i=>i.status!=="comprado"&&Number(i.valorEstimado)>0)
    .map(i=>({i,d:daysUntil(i.dataPrevista)}))
    .sort((a,b)=>{
      const da=a.d==null?1e9:a.d, db=b.d==null?1e9:b.d;
      if(da<60||db<60){if(da!==db)return da-db;}
      const pa=PRI[a.i.prioridade]?.w??1, pb=PRI[b.i.prioridade]?.w??1;
      if(pa!==pb)return pa-pb;
      return Number(a.i.valorEstimado)-Number(b.i.valorEstimado);
    }).map(x=>x.i);
}
function simulate(saveMonth,startBal){
  saveMonth=Number(saveMonth??(S.config.economiaMensal||0));
  startBal=Number(startBal??(S.config.saldoAtual||0));
  const queue=purchaseQueue();
  const predicted={}; const months=[]; let bal=startBal; const MAX=72; let mi=0; let done=true;
  if(saveMonth<=0 && queue.reduce((s,i)=>s+Number(i.valorEstimado),0)>startBal){done=false;}
  while(queue.length){
    const before=bal; bal+=(mi===0?0:saveMonth)+(mi===0?saveMonth:0); // add savings each month incl month0
    const buys=[];
    while(queue.length && Number(queue[0].valorEstimado)<=bal+1e-6){
      const it=queue.shift(); bal-=Number(it.valorEstimado); predicted[it.id]=mi; buys.push(it);
    }
    months.push({mi,label:monthLabel(mi),labelFull:monthLabelFull(mi),before,added:saveMonth,after:bal,buys});
    mi++;
    if(mi>MAX){done=false;break;}
    if(!queue.length)break;
    if(saveMonth<=0)break;
  }
  return {months,predicted,doneMonth:months.length?months[months.length-1].mi:0,finished:queue.length===0&&done,saveMonth,startBal};
}

function donut(pct,size,label,sub){
  size=size||150;const r=size/2-13,c=2*Math.PI*r,off=c*(1-pct/100);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
   <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--surface-2)" stroke-width="13"/>
   <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="url(#g1)" stroke-width="13" stroke-linecap="round"
     stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset .8s cubic-bezier(.2,.8,.2,1)"/>
   <defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="var(--accent)"/><stop offset="1" stop-color="var(--accent-2)"/></linearGradient></defs>
   <text x="50%" y="47%" text-anchor="middle" font-size="${size*0.2}" font-weight="750" fill="var(--text)">${pct}%</text>
   <text x="50%" y="63%" text-anchor="middle" font-size="${size*0.085}" fill="var(--text-3)">${esc(label||"")}</text>
  </svg>`;
}
function hbars(data){ // [{label,val,color}]
  const max=Math.max(1,...data.map(d=>d.val));
  return `<div style="display:flex;flex-direction:column;gap:11px">`+data.map(d=>`
    <div>
      <div class="row between" style="font-size:13px;margin-bottom:5px"><span style="color:var(--text-2);font-weight:550">${esc(d.label)}</span><span style="font-weight:650;font-variant-numeric:tabular-nums">${d.fmt||d.val}</span></div>
      <div class="bar"><span style="width:${d.val/max*100}%;background:${d.color||'linear-gradient(90deg,var(--accent),var(--accent-2))'}"></span></div>
    </div>`).join("")+`</div>`;
}

function greeting(){const h=new Date().getHours();const n=(S.config.nome||"").split(" ")[0];
  const g=h<12?"Bom dia":h<18?"Boa tarde":"Boa noite";return `${g}${n?", "+n:""} — vamos organizar a formatura ✨`;}
function deadlineAlerts(){
  const out=[];
  S.items.filter(i=>i.status!=="comprado"&&i.dataPrevista).forEach(i=>{
    const d=daysUntil(i.dataPrevista);
    if(d==null)return;
    if(d<0)out.push({cls:"bad",txt:`<b>${esc(i.descricao)}</b> está atrasado (prazo ${fmtDate(i.dataPrevista)}).`,d});
    else if(d<=30)out.push({cls:"warn",txt:`<b>${esc(i.descricao)}</b> vence em ${d} dia(s) — ${fmtDate(i.dataPrevista)}.`,d});

  return out.sort((a,b)=>a.d-b.d);
}

function recommendations(m,sim,q){

  const big=q.slice().sort((a,b)=>itemVal(b)-itemVal(a))[0];
  if(big&&m.totalPrevisto&&itemVal(big)/m.totalPrevisto>0.15)r.push({cls:"warn",txt:`<b>${esc(big.descricao)}</b> representa ${Math.round(itemVal(big)/m.totalPrevisto*100)}% do orçamento — planeje com antecedência ou compare opções.`});
  if(!sim.finished&&S.config.dataFormatura){const dg=daysUntil(S.config.dataFormatura);
    if(dg!=null&&dg>0){const need=Math.ceil(m.pendenteVal/Math.max(1,dg/30));r.push({cls:"warn",txt:`Para concluir antes da formatura, economize ~<b>${money0(need)}/mês</b> (faltam ~${Math.round(dg/30)} meses).`});}}
  else if(sim.finished)r.push({cls:"ok",txt:`No ritmo atual você termina tudo em <b>${monthLabelFull(sim.doneMonth)}</b>. 👏`});
  const noPrice=S.items.filter(i=>i.status!=="comprado"&&!(Number(i.valorEstimado)>0)).length;
  if(noPrice)r.push({cls:"info",txt:`${noPrice} item(ns) ainda sem valor — preencha para entrarem no cronograma financeiro.`});

  if(multi)r.push({cls:"info",txt:`${multi} itens têm várias opções pesquisadas — abra e compare preços para economizar.`});
  return r;
}

function guestMetrics(){
  const g=S.guests;const conf=g.filter(x=>x.status==="confirmado");
  const rec=g.filter(x=>x.status==="recusado");const wait=g.filter(x=>x.status!=="confirmado"&&x.status!=="recusado");
  const acomp=conf.reduce((s,x)=>s+Number(x.acompanhantes||0),0);
  const totalPessoas=conf.length+acomp;
  const limite=Number(S.config.limiteConvidados||0);
  const custo=Number(S.config.custoPorConvidado||0)*totalPessoas;
  return {conf,rec,wait,acomp,totalPessoas,limite,custo,

function filteredGuests(){
  const f=ui.guestFilter;
  return S.guests.filter(g=>{
    if(f.grupo&&g.grupo!==f.grupo)return false;
    if(f.st&&(g.status||"aguardando")!==f.st)return false;
    if(f.cidade&&g.cidade!==f.cidade)return false;
    if(f.q){const q=f.q.toLowerCase();if(!((g.nome||"")+(g.apelido||"")+(g.grupo||"")+(g.obs||"")).toLowerCase().includes(q))return false;}
    return true;
  }).sort((a,b)=>(a.nome||"").localeCompare(b.nome||""));
}

function saveItem(id){
  const g=k=>document.getElementById(k).value;
  const obj={categoria:g("f_cat"),descricao:g("f_desc").trim(),prioridade:g("f_pri"),
    valorEstimado:Number(g("f_est"))||0,valorReal:g("f_real")===""?null:Number(g("f_real")),
    status:g("f_st"),unidade:g("f_unid").trim(),dataPrevista:g("f_prev"),dataCompra:g("f_comp"),
    link:g("f_link").trim(),observacoes:g("f_obs").trim()};
  if(!obj.descricao){toast("Informe a descrição");return;}
  if(obj.status==="comprado"&&!obj.dataCompra)obj.dataCompra=new Date().toISOString().slice(0,10);
  if(id){const it=S.items.find(x=>x.id===id);Object.assign(it,obj);}
  else{obj.id=uid("it");obj.opcoes=[];S.items.push(obj);}
  save();closeModal();render();toast("Item salvo ✓");
}

     </div>
     <div class="form-row">
       <div class="field"><label>Grupo / família</label><select class="input" id="g_grupo">${S.gruposConvidados.map(c=>`<option ${g.grupo===c?"selected":""}>${esc(c)}</option>`).join("")}</select></div>
       <div class="field"><label>Telefone</label><input class="input" id="g_tel" value="${esc(g.telefone||"")}"></div>
     </div>
     <div class="form-row">
       <div class="field"><label>Cidade</label><input class="input" id="g_cidade" value="${esc(g.cidade||"")}"></div>
       <div class="field"><label>Tamanho de chinelo</label><input class="input" id="g_chin" value="${esc(g.tamanhoChinelo||"")}"></div>
     </div>
     <div class="form-row">
       <div class="field"><label>Confirmação</label><select class="input" id="g_st"><option value="aguardando" ${g.status==="aguardando"?"selected":""}>Aguardando</option><option value="confirmado" ${g.status==="confirmado"?"selected":""}>Confirmado</option><option value="recusado" ${g.status==="recusado"?"selected":""}>Recusou</option></select></div>
       <div class="field"><label>Nº de acompanhantes</label><input class="input" type="number" min="0" id="g_acomp" value="${g.acompanhantes||0}"></div>
     </div>
     <div class="form-row">
       <div class="field"><label>Data da confirmação</label><input class="input" type="date" id="g_dataconf" value="${esc(g.dataConfirmacao||"")}"></div>
       <div class="field" style="justify-content:center"><label class="row between" style="cursor:pointer">VIP / importante <label class="switch"><input type="checkbox" id="g_vip" ${g.vip?"checked":""}><span></span></label></label></div>
     </div>
     <div class="row" style="gap:20px;margin:4px 0 14px">
       <label class="row" style="gap:8px;cursor:pointer"><input type="checkbox" id="g_env" ${g.conviteEnviado?"checked":""} style="width:18px;height:18px;accent-color:var(--accent)"> Convite enviado</label>
       <label class="row" style="gap:8px;cursor:pointer"><input type="checkbox" id="g_ent" ${g.conviteEntregue?"checked":""} style="width:18px;height:18px;accent-color:var(--accent)"> Convite entregue</label>
     </div>
     <div class="field"><label>Observações</label><textarea class="input" id="g_obs">${esc(g.obs||"")}</textarea></div>
   </div>
   <div class="modal-foot">${!isNew?`<button class="btn danger" onclick="UI.delGuest('${id}')">Excluir</button>`:""}<div style="flex:1"></div>
     <button class="btn" onclick="UI._closeModal()">Cancelar</button>
     <button class="btn primary" onclick="UI.saveGuest('${id||""}')">Salvar</button></div>`);
  setTimeout(()=>document.getElementById("g_nome").focus(),60);
}
function saveGuest(id){
  const g=k=>document.getElementById(k).value,ck=k=>document.getElementById(k).checked;
  const obj={nome:g("g_nome").trim(),apelido:g("g_apel").trim(),grupo:g("g_grupo"),telefone:g("g_tel").trim(),
    cidade:g("g_cidade").trim(),tamanhoChinelo:g("g_chin").trim(),status:g("g_st"),acompanhantes:Number(g("g_acomp"))||0,
    dataConfirmacao:g("g_dataconf"),vip:ck("g_vip"),conviteEnviado:ck("g_env"),conviteEntregue:ck("g_ent"),obs:g("g_obs").trim()};
  if(!obj.nome){toast("Informe o nome");return;}
  if(obj.status==="confirmado"&&!obj.dataConfirmacao)obj.dataConfirmacao=new Date().toISOString().slice(0,10);
  if(id){Object.assign(S.guests.find(x=>x.id===id),obj);}else{obj.id=uid("g");S.guests.push(obj);}
  save();closeModal();render();toast("Convidado salvo ✓");
}

/* ===================================================================
   EXPORT module
   =================================================================== */
const Exp={
  dl(content,name,type){const U=(typeof URL!=="undefined"?URL:window.URL);const b=new Blob([content],{type});const u=U.createObjectURL(b);
    const a=document.createElement("a");a.href=u;a.download=name;a.click();setTimeout(()=>U.revokeObjectURL(u),2000);},
  backup(){this.dl(JSON.stringify({config:S.config,categorias:S.categorias,gruposConvidados:S.gruposConvidados,items:S.items,guests:S.guests,_v:1,_exported:new Date().toISOString()},null,1),
    "formatura-backup-"+new Date().toISOString().slice(0,10)+".json","application/json");toast("Backup baixado ✓");},
  restore(file){if(!file)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);
    if(!d.items&&!d.guests)throw 0;S=migrate(d);save();render();toast("Backup restaurado ✓");}catch(e){toast("Arquivo inválido");}};r.readAsText(file);},
  async excel(scope,cat){
    const XLSX=await loadXLSX();
    if(!XLSX){return this.csvFallback(scope,cat);}
    const wb=XLSX.utils.book_new();
    if(scope==="itens"||scope==="tudo"||scope==="cat"){
      let items=S.items;if(scope==="cat")items=items.filter(i=>i.categoria===cat);
      const rows=items.map(i=>({Categoria:i.categoria,Descrição:i.descricao,Prioridade:PRI[i.prioridade].l,
        "Valor estimado":Number(i.valorEstimado||0),"Valor real":i.valorReal==null?"":Number(i.valorReal),
        Status:i.status==="comprado"?"Comprado":"Pendente",Unidades:i.unidade||"","Data prevista":i.dataPrevista||"",
        "Data compra":i.dataCompra||"",Link:i.link||"",Observações:i.observacoes||""}));
      XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),(scope==="cat"?cat.slice(0,28):"Itens"));
    }
    if(scope==="convidados"||scope==="tudo"){
      const rows=S.guests.map(g=>({Nome:g.nome,Apelido:g.apelido||"",Grupo:g.grupo||"",Telefone:g.telefone||"",
        Cidade:g.cidade||"","Tam. chinelo":g.tamanhoChinelo||"",Status:STL[g.status||"aguardando"],
        Acompanhantes:Number(g.acompanhantes||0),"Convite enviado":g.conviteEnviado?"Sim":"Não",
        "Convite entregue":g.conviteEntregue?"Sim":"Não",VIP:g.vip?"Sim":"Não","Data confirmação":g.dataConfirmacao||"",Observações:g.obs||""}));
      XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),"Convidados");
    }
    XLSX.writeFile(wb,"formatura-"+scope+".xlsx");toast("Excel exportado ✓");
    const sel=document.getElementById("expCat");if(sel)sel.value="";
  },
  csvFallback(scope,cat){
    let rows,name;
    if(scope==="convidados"){name="convidados";rows=[["Nome","Grupo","Telefone","Cidade","Status","Acompanhantes","VIP"],
      ...S.guests.map(g=>[g.nome,g.grupo,g.telefone,g.cidade,STL[g.status||"aguardando"],g.acompanhantes||0,g.vip?"Sim":"Não"])];}
    else{let items=S.items;if(scope==="cat"){items=items.filter(i=>i.categoria===cat);name=cat;}else name="itens";
      rows=[["Categoria","Descrição","Prioridade","Valor estimado","Status","Data prevista","Link"],
      ...items.map(i=>[i.categoria,i.descricao,PRI[i.prioridade].l,i.valorEstimado,i.status,i.dataPrevista,i.link])];}
    const csv="﻿"+rows.map(r=>r.map(c=>`"${String(c==null?"":c).replace(/"/g,'""')}"`).join(";")).join("\n");
    this.dl(csv,"formatura-"+name+".csv","text/csv");toast("Exportado em CSV (Excel offline) ✓");
  }
};
function loadXLSX(){return new Promise(res=>{
  if(window.XLSX)return res(window.XLSX);
  const s=document.createElement("script");
  s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
  s.onload=()=>res(window.XLSX);s.onerror=()=>res(null);
  document.head.appendChild(s);setTimeout(()=>res(window.XLSX||null),6000);
});}

/* ===================================================================
   REPORT (print → PDF) module
   =================================================================== */
const Report={
  gen(kind){
    const m=metrics();const sim=simulate();const gm=guestMetrics();const c=S.config;
    const head=`<div class="r-head"><div><h2>${esc(c.nome||"Formatura")}</h2>
      <div>${esc(c.curso||"")}${c.instituicao?" · "+esc(c.instituicao):""}${c.dataFormatura?" · Formatura: "+fmtDate(c.dataFormatura):""}</div></div>
      <div style="text-align:right;font-size:11px;color:#888">Relatório ${kind}<br>${new Date().toLocaleDateString("pt-BR")}</div></div>`;
    const kpis=`<div style="margin:6px 0 10px">
      <span class="rk"><b>${m.pct}%</b><span>concluído</span></span>
      <span class="rk"><b>${m.comprados.length}/${S.items.length}</b><span>itens</span></span>
      <span class="rk"><b>${money0(m.totalPrevisto)}</b><span>total previsto</span></span>
      <span class="rk"><b>${money0(m.gasto)}</b><span>já gasto</span></span>
      <span class="rk"><b>${money0(m.pendenteVal)}</b><span>a gastar</span></span>
      <span class="rk"><b>${money0(m.meta)}</b><span>meta</span></span></div>`;
    let body="";
    const itemsTable=(list,title)=>`<h3>${title} (${list.length})</h3><table><thead><tr><th>Item</th><th>Categoria</th><th>Prior.</th><th>Valor</th><th>Status</th><th>Prazo</th></tr></thead><tbody>${list.map(i=>`<tr><td>${esc(i.descricao)}</td><td>${esc(i.categoria)}</td><td>${PRI[i.prioridade].l}</td><td>${money0(itemVal(i))}</td><td>${i.status==="comprado"?"Comprado":"Pendente"}</td><td>${i.dataPrevista?fmtDate(i.dataPrevista):"-"}</td></tr>`).join("")}</tbody></table>`;
    const schedule=()=>`<h3>Cronograma de compras (${money0(sim.saveMonth)}/mês)</h3><table><thead><tr><th>Mês</th><th>Compras</th><th>Valor</th><th>Saldo final</th></tr></thead><tbody>${sim.months.map(mo=>`<tr><td>${mo.labelFull}</td><td>${mo.buys.map(i=>esc(i.descricao)).join(", ")||"—"}</td><td>${money0(mo.buys.reduce((s,i)=>s+Number(i.valorEstimado),0))}</td><td>${money0(mo.after)}</td></tr>`).join("")}</tbody></table>${sim.finished?`<p>Conclusão prevista: <b>${monthLabelFull(sim.doneMonth)}</b>.</p>`:""}`;

    if(kind==="completo"){
      body=kpis+`<div style="display:flex;gap:20px;align-items:center;margin:8px 0">${donut(m.pct,150,"concluído")}
        <div style="font-size:12px"><b>Próximos a comprar:</b><br>${purchaseQueue().slice(0,5).map(i=>esc(i.descricao)+" — "+money0(i.valorEstimado)).join("<br>")||"—"}</div></div>`
        +itemsTable(S.items.filter(i=>i.status!=="comprado"),"Itens pendentes")
        +itemsTable(S.items.filter(i=>i.status==="comprado"),"Itens comprados")
        +schedule()
        +`<h3>Convidados (${S.guests.length})</h3><p>Confirmados: ${gm.conf.length} · Recusaram: ${gm.rec.length} · Aguardando: ${gm.wait.length} · Total de pessoas: ${gm.totalPessoas}${gm.limite?"/"+gm.limite:""} · Custo: ${money0(gm.custo)}</p>`;
    }else if(kind==="financeiro"){
      body=kpis+schedule()+itemsTable(purchaseQueue(),"Fila de compras (prioridade)");
    }else if(kind==="convidados"){
      body=`<div style="margin:6px 0 10px"><span class="rk"><b>${S.guests.length}</b><span>convidados</span></span>
        <span class="rk"><b>${gm.conf.length}</b><span>confirmados</span></span><span class="rk"><b>${gm.rec.length}</b><span>recusaram</span></span>
        <span class="rk"><b>${gm.wait.length}</b><span>aguardando</span></span><span class="rk"><b>${gm.totalPessoas}</b><span>total pessoas</span></span>
        <span class="rk"><b>${money0(gm.custo)}</b><span>custo</span></span></div>`
        +`<h3>Lista de convidados</h3><table><thead><tr><th>Nome</th><th>Grupo</th><th>Telefone</th><th>Acomp.</th><th>Status</th></tr></thead><tbody>${filteredGuests().map(g=>`<tr><td>${esc(g.nome)}${g.vip?" ⭐":""}</td><td>${esc(g.grupo||"")}</td><td>${esc(g.telefone||"")}</td><td>${g.acompanhantes||0}</td><td>${STL[g.status||"aguardando"]}</td></tr>`).join("")}</tbody></table>`;
    }
    document.getElementById("report").innerHTML=head+body;
    setTimeout(()=>window.print(),120);
  }
};

/* ===================================================================
   UI controller (exposed)
   =================================================================== */
function openNav(){document.getElementById("sidebar").classList.add("open");document.getElementById("scrim").classList.add("show");}
function closeNav(){document.getElementById("sidebar").classList.remove("open");document.getElementById("scrim").classList.remove("show");}
window.UI={
  go(t){ui.tab=t;closeNav();render();window.scrollTo(0,0);},
  login(name){doLogin(name||(document.getElementById("loginName")?document.getElementById("loginName").value:""));},
  logout(){if(confirm("Sair e trocar de usuário? Seus dados continuam salvos neste navegador.")){doLogout();}},
  openNav(){openNav();},
  closeNav(){closeNav();},
  toggleTheme(){const r=document.documentElement;const d=r.dataset.theme==="dark"?"light":"dark";r.dataset.theme=d;
    try{localStorage.setItem("formaturaTheme",d);}catch(e){}render();},
  setAccent(c){S.config.accent=c;applyAccent();save();render();},
  itemView(v){ui.itemView=v;renderItemArea();document.querySelectorAll(".seg button").forEach(b=>{});render();},
  guestView(v){ui.guestView=v;render();},
  editItem(id){editItem(id);},saveItem(id){saveItem(id);},
  delItem(id){if(confirm("Excluir este item?")){S.items=S.items.filter(x=>x.id!==id);save();closeModal();render();toast("Item excluído");}},
  toggleBuy(id){const it=S.items.find(x=>x.id===id);it.status=it.status==="comprado"?"pendente":"comprado";
    if(it.status==="comprado"&&!it.dataCompra)it.dataCompra=new Date().toISOString().slice(0,10);save();renderItemArea();render();},
  editGuest(id){editGuest(id);},saveGuest(id){saveGuest(id);},
  delGuest(id){if(confirm("Excluir este convidado?")){S.guests=S.guests.filter(x=>x.id!==id);save();closeModal();render();toast("Convidado excluído");}},
  quickRsvp(id,st){const g=S.guests.find(x=>x.id===id);g.status=st;if(st==="confirmado"&&!g.dataConfirmacao)g.dataConfirmacao=new Date().toISOString().slice(0,10);save();render();},
  _closeModal(){closeModal();},
  setSim(v){ui.simSave=v;render();},
  applySim(){S.config.economiaMensal=ui.simSave??S.config.economiaMensal;S.config.saldoAtual=ui.simStart??S.config.saldoAtual;save();toast("Salvo no perfil ✓");},
  setMetaTotal(){S.config.metaFinanceira=Math.round(metrics().totalPrevisto);save();render();toast("Meta atualizada ✓");},
  addCat(){const v=document.getElementById("newCat").value.trim();if(v&&!S.categorias.includes(v)){S.categorias.push(v);save();render();}},
  delCat(c){if(S.items.some(i=>i.categoria===c)){if(!confirm("Há itens nesta categoria. Excluir mesmo assim? (os itens permanecem com o nome antigo)"))return;}
    S.categorias=S.categorias.filter(x=>x!==c);save();render();},
  addGrp(){const v=document.getElementById("newGrp").value.trim();if(v&&!S.gruposConvidados.includes(v)){S.gruposConvidados.push(v);save();render();}},
  delGrp(g){S.gruposConvidados=S.gruposConvidados.filter(x=>x!==g);save();render();},
  resetAll(){if(confirm("Apagar TUDO e começar em branco? Faça backup antes.")){
    S={config:Object.assign(clone(SEED.config),{nome:"",curso:"",instituicao:"",dataFormatura:"",metaFinanceira:0,frase:"Rumo à formatura!"}),
       categorias:clone(SEED.categorias),gruposConvidados:clone(SEED.gruposConvidados),items:[],guests:[]};
    save();ui.tab="dash";render();toast("Novo planejamento criado");}},
  resetSeed(){if(confirm("Restaurar os dados de exemplo (da planilha)? Seus dados atuais serão substituídos.")){
    S=clone(SEED);save();ui.tab="dash";render();toast("Dados de exemplo restaurados");}}
};
window.Exp=Exp;window.Report=Report;

/* ---------- accent + theme ---------- */
function applyAccent(){
  const c=S.config.accent;if(!c)return;
  const root=document.documentElement.style;
  root.setProperty("--accent",c);
  // soft tint
  root.setProperty("--accent-soft",hexA(c,document.documentElement.dataset.theme==="dark"?.18:.10));
}
function hexA(hex,a){const h=hex.replace("#","");const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
  return `rgba(${r},${g},${b},${a})`;}

/* ---------- boot ---------- */
(function boot(){
  try{const t=localStorage.getItem("formaturaTheme");if(t)document.documentElement.dataset.theme=t;}catch(e){}
  if(currentUser){S=loadUser(currentUser);applyAccent();render();}
  else{showLogin();}
})();
})();
</script>
